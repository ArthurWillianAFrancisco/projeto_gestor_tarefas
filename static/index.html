<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LockDown API - Security Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Adicionando ícones para ficar mais profissional -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="bg-slate-900 text-white font-sans">

    <!-- SEÇÃO: AUTENTICAÇÃO (LOGIN) -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-slate-800 p-8 rounded-lg shadow-2xl w-96 border border-slate-700 text-center">
            <h2 class="text-3xl font-bold mb-6 text-blue-400">LockDown API</h2>
            <input id="login-user" type="text" placeholder="Usuário" class="w-full p-3 mb-4 bg-slate-700 rounded border border-slate-600 focus:outline-none focus:border-blue-500">
            <input id="login-pass" type="password" placeholder="Senha" class="w-full p-3 mb-6 bg-slate-700 rounded border border-slate-600 focus:outline-none focus:border-blue-500">
            <button onclick="fazerLogin()" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold transition mb-4">Entrar</button>
            <p class="text-sm">Monitoramento de Segurança Digital</p>
            <button onclick="switchScreen('register-screen')" class="mt-4 text-blue-400 hover:underline text-sm">Criar novo operador</button>
        </div>
    </div>

    <!-- SEÇÃO: CADASTRO -->
    <div id="register-screen" class="hidden min-h-screen flex items-center justify-center">
        <div class="bg-slate-800 p-8 rounded-lg shadow-2xl w-96 border border-slate-700 text-center">
            <h2 class="text-2xl font-bold mb-6">Novo Operador</h2>
            <input id="reg-user" type="text" placeholder="Nome de Usuário" class="w-full p-3 mb-4 bg-slate-700 rounded border border-slate-600">
            <input id="reg-pass" type="password" placeholder="Senha" class="w-full p-3 mb-4 bg-slate-700 rounded border border-slate-600">
            <select id="reg-role" class="w-full p-3 mb-6 bg-slate-700 rounded border border-slate-600 text-slate-300">
                <option value="user">Usuário (Leitura)</option>
                <option value="admin">Administrador (Escrita/Delete)</option>
            </select>
            <button onclick="fazerCadastro()" class="w-full bg-green-600 hover:bg-green-700 p-3 rounded font-bold transition mb-4">Cadastrar</button>
            <button onclick="switchScreen('login-screen')" class="text-slate-400 text-sm hover:underline">Voltar ao Login</button>
        </div>
    </div>

    <!-- SEÇÃO: DASHBOARD -->
    <div id="dashboard-screen" class="hidden min-h-screen p-6">
        <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-blue-400 tracking-tight">Security Dashboard</h1>
                <p class="text-slate-400">Operador ativo: <span id="current-user" class="text-white font-mono">---</span></p>
            </div>
            <button onclick="logout()" class="bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white px-6 py-2 rounded-lg font-bold border border-red-600/50 transition">Sair</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- COLUNA: BOTS/MQTT -->
            <div class="bg-slate-800/40 p-5 rounded-2xl border border-red-500/20">
                <h3 class="text-red-500 font-black mb-6 flex items-center gap-2 uppercase text-xs tracking-widest">
                    <span class="material-symbols-outlined">smart_toy</span> Alertas de Bot (Invasão/IoT)
                </h3>
                <div id="bot-tasks" class="space-y-4"></div>
            </div>

            <!-- COLUNA: OPERADORES -->
            <div class="bg-slate-800/40 p-5 rounded-2xl border border-blue-500/20">
                <h3 class="text-blue-500 font-black mb-6 flex items-center gap-2 uppercase text-xs tracking-widest">
                    <span class="material-symbols-outlined">person</span> Tarefas de Operadores
                </h3>
                <div id="user-tasks" class="space-y-4"></div>
            </div>

            <!-- COLUNA: CRIAÇÃO -->
            <div class="bg-slate-800/60 p-6 rounded-2xl border border-slate-700">
                <h3 class="text-slate-200 font-bold mb-4 flex items-center gap-2">
                    <span class="material-symbols-outlined">add_task</span> Novo Chamado
                </h3>
                <div class="space-y-4">
                    <input id="task-title" type="text" placeholder="Título do Alerta" class="w-full p-3 bg-slate-900 rounded-lg border border-slate-700 outline-none focus:border-blue-500">
                    <textarea id="task-desc" placeholder="Descrição técnica ou IP suspeito..." class="w-full p-3 bg-slate-900 rounded-lg border border-slate-700 outline-none h-32 focus:border-blue-500"></textarea>
                    <button onclick="criarTarefa()" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-bold shadow-lg shadow-blue-900/20 transition">+ Abrir Chamado</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        function switchScreen(id) {
            ['login-screen', 'register-screen', 'dashboard-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function fazerLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            try {
                const res = await axios.post(`${API_URL}/auth/login`, { username: user, password: pass });
                localStorage.setItem('token', res.data.access_token);
                document.getElementById('current-user').innerText = user;
                switchScreen('dashboard-screen');
                carregarTarefas();
            } catch (err) { alert("Credenciais Inválidas!"); }
        }

        async function fazerCadastro() {
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            const role = document.getElementById('reg-role').value;
            try {
                await axios.post(`${API_URL}/auth/register`, { username: user, password: pass, role: role });
                alert("Cadastro realizado!");
                switchScreen('login-screen');
            } catch (err) { alert("Erro ao cadastrar."); }
        }

        async function carregarTarefas() {
            const token = localStorage.getItem('token');
            try {
                const res = await axios.get(`${API_URL}/tasks`, { headers: { Authorization: `Bearer ${token}` } });
                const botDiv = document.getElementById('bot-tasks');
                const userDiv = document.getElementById('user-tasks');
                botDiv.innerHTML = ''; userDiv.innerHTML = '';

                res.data.forEach(task => {
                    const concluido = task.status === 'concluido';
                    const isBot = task.description.toLowerCase().includes('mqtt') || task.title.toLowerCase().includes('ip');
                    
                    const cardHtml = `
                        <div class="bg-slate-700/40 p-4 rounded-xl border-l-4 ${concluido ? 'border-green-500 opacity-50' : (isBot ? 'border-red-500 shadow-red-900/10' : 'border-blue-500')} shadow-xl">
                            <div class="flex justify-between items-start mb-2">
                                <h4 id="t-${task.id}" contenteditable="${!concluido}" class="font-bold text-lg outline-none focus:bg-slate-600 rounded px-1 ${concluido ? 'line-through text-slate-500' : ''}">${task.title}</h4>
                                <div class="flex gap-2">
                                    ${!concluido ? `<button onclick="salvarEdicao(${task.id})" class="text-blue-400 text-sm" title="Salvar">💾</button>` : ''}
                                    ${!concluido ? `<button onclick="concluir(${task.id})" class="text-green-500 text-sm">✅</button>` : '<span>✔️</span>'}
                                </div>
                            </div>
                            <p id="d-${task.id}" contenteditable="${!concluido}" class="text-sm text-slate-400 outline-none focus:bg-slate-600 rounded px-1">${task.description}</p>
                            <div class="mt-4 flex justify-between items-center">
                                <span class="text-[9px] font-black uppercase px-2 py-1 bg-slate-900 rounded ${concluido ? 'text-green-500' : 'text-slate-500'}">${task.status}</span>
                                <button onclick="deletar(${task.id})" class="text-red-500 hover:text-red-400 text-[10px] font-bold uppercase tracking-tighter">Excluir</button>
                            </div>
                        </div>
                    `;
                    if (isBot) botDiv.innerHTML += cardHtml;
                    else userDiv.innerHTML += cardHtml;
                });
            } catch (err) { console.error(err); }
        }

        async function criarTarefa() {
            const token = localStorage.getItem('token');
            const title = document.getElementById('task-title').value;
            const description = document.getElementById('task-desc').value;
            try {
                await axios.post(`${API_URL}/tasks`, { title, description }, { headers: { Authorization: `Bearer ${token}` } });
                document.getElementById('task-title').value = '';
                document.getElementById('task-desc').value = '';
                carregarTarefas();
            } catch (err) { alert("Erro ao criar!"); }
        }

        async function salvarEdicao(id) {
            const token = localStorage.getItem('token');
            const title = document.getElementById(`t-${id}`).innerText;
            const description = document.getElementById(`d-${id}`).innerText;
            try {
                await axios.put(`${API_URL}/tasks/${id}`, { title, description }, { headers: { Authorization: `Bearer ${token}` } });
                carregarTarefas();
            } catch (err) { alert("Erro ao atualizar!"); }
        }

        async function concluir(id) {
            const token = localStorage.getItem('token');
            try {
                await axios.put(`${API_URL}/tasks/${id}`, { status: 'concluido' }, { headers: { Authorization: `Bearer ${token}` } });
                carregarTarefas();
            } catch (err) { alert("Erro ao concluir!"); }
        }

        async function deletar(id) {
            const token = localStorage.getItem('token');
            if(!confirm("Remover chamado?")) return;
            try {
                await axios.delete(`${API_URL}/tasks/${id}`, { headers: { Authorization: `Bearer ${token}` } });
                carregarTarefas();
            } catch (err) { alert("Apenas Administradores podem excluir!"); }
        }

        function logout() { localStorage.removeItem('token'); window.location.reload(); }
    </script>
</body>
</html>
