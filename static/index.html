<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LockDown API - Cadastro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-slate-800 p-8 rounded-lg shadow-2xl w-96 border border-slate-700 text-center">
            <h2 class="text-3xl font-bold mb-6 text-blue-400">LockDown API</h2>
            <input id="login-user" type="text" placeholder="Usuário" class="w-full p-3 mb-4 bg-slate-700 rounded border border-slate-600 focus:outline-none focus:border-blue-500">
            <input id="login-pass" type="password" placeholder="Senha" class="w-full p-3 mb-6 bg-slate-700 rounded border border-slate-600 focus:outline-none focus:border-blue-500">
            <button onclick="fazerLogin()" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold transition mb-4">Entrar</button>
            <p class="text-sm">Não tem conta? <a href="javascript:void(0)" onclick="switchScreen('register-screen')" class="text-blue-400 hover:underline">Cadastre-se</a></p>
        </div>
    </div>

    <!-- TELA DE CADASTRO -->
    <div id="register-screen" class="hidden min-h-screen flex items-center justify-center">
        <div class="bg-slate-800 p-8 rounded-lg shadow-2xl w-96 border border-slate-700 text-center">
            <h2 class="text-2xl font-bold mb-6">Criar Nova Conta</h2>
            <input id="reg-user" type="text" placeholder="Nome de Usuário" class="w-full p-3 mb-4 bg-slate-700 rounded border border-slate-600 focus:border-green-500">
            <input id="reg-pass" type="password" placeholder="Senha" class="w-full p-3 mb-4 bg-slate-700 rounded border border-slate-600 focus:border-green-500">
            
            <label class="block mb-2 text-sm text-left text-slate-400">Tipo de Acesso:</label>
            <select id="reg-role" class="w-full p-3 mb-6 bg-slate-700 rounded border border-slate-600">
                <option value="user">Usuário Comum (Visualizar)</option>
                <option value="admin">Administrador (Controle Total)</option>
            </select>

            <button onclick="fazerCadastro()" class="w-full bg-green-600 hover:bg-green-700 p-3 rounded font-bold transition mb-4">Finalizar Cadastro</button>
            <p class="text-sm"><a href="javascript:void(0)" onclick="switchScreen('login-screen')" class="text-slate-400 hover:underline">Voltar para o Login</a></p>
        </div>
    </div>

    <script>
        // PEGA O LINK AUTOMATICAMENTE (Seja localhost ou Render)
        const API_URL = window.location.origin; 

        function switchScreen(screenId) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('register-screen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        async function fazerCadastro() {
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            const role = document.getElementById('reg-role').value;

            if(!user || !pass) return alert("Preencha todos os campos!");

            try {
                await axios.post(`${API_URL}/auth/register`, { 
                    username: user, 
                    password: pass, 
                    role: role 
                });
                alert("Usuário " + user + " cadastrado com sucesso!");
                switchScreen('login-screen');
            } catch (err) {
                alert("Erro ao cadastrar: " + (err.response?.data?.message || "Servidor offline"));
            }
        }

        async function fazerLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;

            try {
                const res = await axios.post(`${API_URL}/auth/login`, { username: user, password: pass });
                localStorage.setItem('token', res.data.access_token);
                alert("Bem-vindo, " + user + "!");
                // No próximo passo criaremos o Dashboard aqui
            } catch (err) {
                alert("Login falhou: Usuário ou senha incorretos.");
            }
        }
    </script>
</body>
</html>
