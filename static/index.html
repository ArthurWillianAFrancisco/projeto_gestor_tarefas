<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LockDown API - Security Kanban</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        .kanban-col::-webkit-scrollbar { width: 4px; }
        .kanban-col::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden">

    <!-- TELA: LOGIN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-slate-800 to-slate-950">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-96 border border-slate-700 text-center">
            <h2 class="text-4xl font-black mb-2 text-blue-500 tracking-tighter">LOCKDOWN</h2>
            <p class="text-slate-500 text-xs mb-8 uppercase tracking-widest">Security Control System</p>
            <input id="login-user" type="text" placeholder="Operador" class="w-full p-3 mb-4 bg-slate-900 rounded-lg border border-slate-700 outline-none focus:border-blue-500 text-sm transition-all">
            <input id="login-pass" type="password" placeholder="Senha" class="w-full p-3 mb-6 bg-slate-900 rounded-lg border border-slate-700 outline-none focus:border-blue-500 text-sm transition-all">
            <button onclick="fazerLogin()" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded-lg font-bold transition shadow-lg shadow-blue-900/20">Acessar Terminal</button>
            <button onclick="switchScreen('register-screen')" class="mt-6 text-xs text-slate-500 hover:text-blue-400 transition underline">Solicitar novo acesso</button>
        </div>
    </div>

    <!-- TELA: CADASTRO -->
    <div id="register-screen" class="hidden min-h-screen flex items-center justify-center bg-slate-950">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-96 border border-slate-700 text-center">
            <h2 class="text-2xl font-bold mb-6">Novo Registro</h2>
            <input id="reg-user" type="text" placeholder="Nome do Operador" class="w-full p-3 mb-4 bg-slate-900 rounded-lg border border-slate-700 outline-none">
            <input id="reg-pass" type="password" placeholder="Senha de Acesso" class="w-full p-3 mb-6 bg-slate-900 rounded-lg border border-slate-700 outline-none">
            <select id="reg-role" class="w-full p-3 mb-8 bg-slate-900 rounded-lg border border-slate-700 text-sm text-slate-400 outline-none">
                <option value="user">Nível: Usuário (Padrão)</option>
                <option value="admin">Nível: Administrador (Full)</option>
            </select>
            <button onclick="fazerCadastro()" class="w-full bg-emerald-600 hover:bg-emerald-500 p-3 rounded-lg font-bold transition">Confirmar Registro</button>
            <button onclick="switchScreen('login-screen')" class="mt-4 text-xs text-slate-500 hover:underline">Cancelar e Voltar</button>
        </div>
    </div>

    <!-- TELA: DASHBOARD KANBAN -->
    <div id="dashboard-screen" class="hidden h-screen flex flex-col bg-slate-950">
        <header class="p-4 bg-slate-900/50 backdrop-blur-md border-b border-slate-800 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="h-8 w-1 bg-blue-500 rounded-full"></div>
                <div>
                    <h1 class="text-lg font-black text-slate-100 tracking-tight uppercase">Security Dashboard</h1>
                    <p class="text-[10px] text-slate-500 font-mono">STATUS: ONLINE | OPERADOR: <span id="current-user" class="text-blue-400">---</span></p>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="abrirModal()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-xs font-black flex items-center gap-2 transition shadow-lg shadow-blue-900/20">
                    <span class="material-symbols-outlined text-sm">add</span> NOVO CHAMADO
                </button>
                <button onclick="logout()" class="p-2 text-slate-500 hover:text-red-500 transition">
                    <span class="material-symbols-outlined">power_settings_new</span>
                </button>
            </div>
        </header>

        <main class="flex-1 p-6 overflow-x-auto flex gap-6 items-start">
            
            <!-- COLUNA: PENDENTE -->
            <div class="min-w-[320px] w-[320px] flex flex-col max-h-full">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h3 class="text-[11px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-slate-500"></span> Pendentes
                    </h3>
                    <span id="count-pendente" class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-slate-400 font-bold">0</span>
                </div>
                <div id="col-pendente" class="kanban-col space-y-4 overflow-y-auto pr-2 pb-4"></div>
            </div>

            <!-- COLUNA: INICIADO -->
            <div class="min-w-[320px] w-[320px] flex flex-col max-h-full">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h3 class="text-[11px] font-black text-blue-500 uppercase tracking-widest flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span> Em Atendimento
                    </h3>
                    <span id="count-iniciado" class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-blue-400 font-bold">0</span>
                </div>
                <div id="col-iniciado" class="kanban-col space-y-4 overflow-y-auto pr-2 pb-4"></div>
            </div>

            <!-- COLUNA: IMPEDIDO -->
            <div class="min-w-[320px] w-[320px] flex flex-col max-h-full">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h3 class="text-[11px] font-black text-red-500 uppercase tracking-widest flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-red-500"></span> Impedidos
                    </h3>
                    <span id="count-impedido" class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-red-400 font-bold">0</span>
                </div>
                <div id="col-impedido" class="kanban-col space-y-4 overflow-y-auto pr-2 pb-4"></div>
            </div>

            <!-- COLUNA: CONCLUÍDO -->
            <div class="min-w-[320px] w-[320px] flex flex-col max-h-full">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h3 class="text-[11px] font-black text-emerald-500 uppercase tracking-widest flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span> Concluídos
                    </h3>
                    <span id="count-concluido" class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-emerald-400 font-bold">0</span>
                </div>
                <div id="col-concluido" class="kanban-col space-y-4 overflow-y-auto pr-2 pb-4"></div>
            </div>

        </main>
    </div>

    <!-- MODAL: CRIAR TAREFA -->
    <div id="modal-task" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 border border-slate-700 p-8 rounded-2xl w-full max-w-lg shadow-2xl">
            <h2 class="text-2xl font-bold mb-2">Novo Chamado de Segurança</h2>
            <p class="text-slate-400 text-sm mb-6">Preencha os detalhes técnicos para análise da equipe.</p>
            <input id="task-title" type="text" placeholder="Título (Ex: Bloqueio de IP Suspeito)" class="w-full p-4 bg-slate-900 rounded-xl border border-slate-700 mb-4 outline-none focus:border-blue-500 text-white transition-all">
            <textarea id="task-desc" placeholder="Descreva o problema ou as etapas do check-list..." class="w-full p-4 bg-slate-900 rounded-xl border border-slate-700 mb-8 h-40 outline-none focus:border-blue-500 text-white transition-all"></textarea>
            <div class="flex gap-4">
                <button onclick="fecharModal()" class="flex-1 p-4 text-slate-400 font-bold hover:text-white transition">CANCELAR</button>
                <button onclick="criarTarefa()" class="flex-1 bg-blue-600 p-4 rounded-xl font-black tracking-widest hover:bg-blue-500 transition shadow-lg shadow-blue-900/40">CRIAR CARD</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        function switchScreen(id) {
            ['login-screen', 'register-screen', 'dashboard-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function abrirModal() { document.getElementById('modal-task').classList.remove('hidden'); }
        function fecharModal() { document.getElementById('modal-task').classList.add('hidden'); }

        async function fazerLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            try {
                const res = await axios.post(`${API_URL}/auth/login`, { username: user, password: pass });
                localStorage.setItem('token', res.data.access_token);
                localStorage.setItem('username', user);
                document.getElementById('current-user').innerText = user.toUpperCase();
                switchScreen('dashboard-screen');
                carregarTarefas();
            } catch (err) { alert("Acesso Negado: Verifique suas credenciais."); }
        }

        async function fazerCadastro() {
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            const role = document.getElementById('reg-role').value;
            try {
                await axios.post(`${API_URL}/auth/register`, { username: user, password: pass, role: role });
                alert("Operador registrado com sucesso!");
                switchScreen('login-screen');
            } catch (err) { alert("Erro ao registrar operador."); }
        }

        async function carregarTarefas() {
            const token = localStorage.getItem('token');
            try {
                const res = await axios.get(`${API_URL}/tasks`, { headers: { Authorization: `Bearer ${token}` } });
                const cols = { pendente: '', iniciado: '', impedido: '', concluido: '' };
                const counts = { pendente: 0, iniciado: 0, impedido: 0, concluido: 0 };

                res.data.forEach(task => {
                    const status = task.status || 'pendente';
                    const isBot = task.description.toLowerCase().includes('mqtt') || task.title.toLowerCase().includes('bot');
                    const autor = isBot ? 'BOT-SECURITY' : (task.username || 'OPERADOR');
                    
                    const borderMap = {
                        pendente: 'border-l-slate-600',
                        iniciado: 'border-l-blue-500 shadow-blue-900/10',
                        impedido: 'border-l-red-500 shadow-red-900/10',
                        concluido: 'border-l-emerald-500 opacity-80'
                    };

                    const card = `
                        <div class="bg-slate-800 border border-slate-700/50 p-4 rounded-xl shadow-xl border-l-4 ${borderMap[status]} group hover:border-slate-500 transition-all">
                            <div class="flex justify-between items-start mb-3">
                                <h4 class="font-bold text-sm text-slate-100 leading-tight">${task.title}</h4>
                                <button onclick="deletar(${task.id})" class="text-slate-600 hover:text-red-500 transition opacity-0 group-hover:opacity-100">
                                    <span class="material-symbols-outlined text-base">delete</span>
                                </button>
                            </div>
                            <p class="text-[11px] text-slate-400 mb-4 line-clamp-3 leading-relaxed font-medium">${task.description}</p>
                            
                            <div class="flex items-center justify-between border-t border-slate-700/50 pt-3">
                                <span class="text-[9px] font-black ${isBot ? 'text-red-500' : 'text-blue-500'} flex items-center gap-1 uppercase tracking-tighter">
                                    <span class="material-symbols-outlined text-[12px]">${isBot ? 'smart_toy' : 'person_check'}</span> ${autor}
                                </span>
                                
                                <select onchange="mudarStatus(${task.id}, this.value)" class="bg-slate-900 text-[9px] font-black p-1 rounded-md outline-none border border-slate-700 cursor-pointer hover:border-blue-500 transition-colors">
                                    <option value="pendente" ${status === 'pendente' ? 'selected' : ''}>PENDENTE</option>
                                    <option value="iniciado" ${status === 'iniciado' ? 'selected' : ''}>INICIADO</option>
                                    <option value="impedido" ${status === 'impedido' ? 'selected' : ''}>IMPEDIDO</option>
                                    <option value="concluido" ${status === 'concluido' ? 'selected' : ''}>CONCLUÍDO</option>
                                </select>
                            </div>
                        </div>
                    `;
                    cols[status] += card;
                    counts[status]++;
                });

                Object.keys(cols).forEach(s => {
                    document.getElementById(`col-${s}`).innerHTML = cols[s] || `<p class="text-center text-slate-700 text-[10px] mt-4 font-bold italic tracking-widest uppercase">Sem cards</p>`;
                    document.getElementById(`count-${s}`).innerText = counts[s];
                });
            } catch (err) { console.error("Erro ao carregar terminal:", err); }
        }

        async function mudarStatus(id, novoStatus) {
            const token = localStorage.getItem('token');
            try {
                await axios.put(`${API_URL}/tasks/${id}`, { status: novoStatus }, { headers: { Authorization: `Bearer ${token}` } });
                carregarTarefas();
            } catch (err) { alert("Erro na atualização de status."); carregarTarefas(); }
        }

        async function criarTarefa() {
            const token = localStorage.getItem('token');
            const title = document.getElementById('task-title').value;
            const description = document.getElementById('task-desc').value;
            if(!title || !description) return alert("Preencha todos os campos técnicos.");

            try {
                await axios.post(`${API_URL}/tasks`, { title, description, status: 'pendente' }, { headers: { Authorization: `Bearer ${token}` } });
                document.getElementById('task-title').value = '';
                document.getElementById('task-desc').value = '';
                fecharModal();
                carregarTarefas();
            } catch (err) { alert("Falha na criação do chamado."); }
        }

        async function deletar(id) {
            const token = localStorage.getItem('token');
            if(!confirm("CONFIRMAR EXCLUSÃO PERMANENTE?")) return;
            try {
                await axios.delete(`${API_URL}/tasks/${id}`, { headers: { Authorization: `Bearer ${token}` } });
                carregarTarefas();
            } catch (err) { alert("ACESSO NEGADO: Apenas Administradores."); }
        }

        function logout() { localStorage.removeItem('token'); localStorage.removeItem('username'); window.location.reload(); }
    </script>
</body>
</html>
