<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LockDown API - Security Kanban Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        .kanban-col { height: calc(100vh - 120px); }
        .card-edit:focus { background: rgba(30, 41, 59, 0.5); outline: none; border-radius: 4px; }
        .checklist-item.done { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden">

    <!-- TELAS DE LOGIN E CADASTRO (MANTIDAS) -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-950">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-96 border border-slate-700 text-center">
            <h2 class="text-3xl font-black mb-6 text-blue-500 tracking-tighter">LOCKDOWN.SYS</h2>
            <input id="login-user" type="text" placeholder="Usuário" class="w-full p-3 mb-4 bg-slate-900 rounded-lg border border-slate-700 outline-none focus:border-blue-500 text-sm">
            <input id="login-pass" type="password" placeholder="Senha" class="w-full p-3 mb-6 bg-slate-900 rounded-lg border border-slate-700 outline-none focus:border-blue-500 text-sm">
            <button onclick="fazerLogin()" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded-lg font-bold transition">Acessar Terminal</button>
            <button onclick="switchScreen('register-screen')" class="mt-4 text-xs text-slate-500 hover:underline">Novo Registro</button>
        </div>
    </div>

    <div id="register-screen" class="hidden min-h-screen flex items-center justify-center bg-slate-950">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-96 border border-slate-700 text-center">
            <h2 class="text-2xl font-bold mb-6">Novo Operador</h2>
            <input id="reg-user" type="text" placeholder="Nome" class="w-full p-3 mb-4 bg-slate-900 rounded-lg border border-slate-700 outline-none">
            <input id="reg-pass" type="password" placeholder="Senha" class="w-full p-3 mb-6 bg-slate-900 rounded-lg border border-slate-700 outline-none">
            <select id="reg-role" class="w-full p-3 mb-6 bg-slate-900 rounded-lg border border-slate-700 text-sm">
                <option value="user">Usuário</option>
                <option value="admin">Administrador</option>
            </select>
            <button onclick="fazerCadastro()" class="w-full bg-emerald-600 p-3 rounded-lg font-bold">Cadastrar</button>
            <button onclick="switchScreen('login-screen')" class="mt-4 text-xs text-slate-500">Voltar</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-screen" class="hidden h-screen flex flex-col bg-slate-950">
        <header class="p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-black text-blue-400 tracking-tighter">CONTROL PANEL</h1>
                <span class="text-[10px] bg-slate-800 px-2 py-1 rounded border border-slate-700 font-mono">OP: <span id="current-user">---</span></span>
            </div>
            <div class="flex gap-4">
                <button onclick="abrirModal()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-xs font-black flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">add</span> NOVO CARD
                </button>
                <button onclick="logout()" class="text-slate-500 hover:text-red-500"><span class="material-symbols-outlined">power_settings_new</span></button>
            </div>
        </header>

        <main class="flex-1 p-6 flex gap-6 overflow-x-auto items-start">
            <!-- COLUNAS (REPETIR PARA CADA STATUS) -->
            <template id="col-template">
                <div class="min-w-[320px] w-[320px] flex flex-col">
                    <h3 class="status-title text-[11px] font-black uppercase tracking-widest mb-4 flex justify-between px-2 text-slate-500">
                        <span></span> <span class="count bg-slate-800 px-2 rounded">0</span>
                    </h3>
                    <div class="kanban-col space-y-4 overflow-y-auto pr-2"></div>
                </div>
            </template>
            
            <div id="kanban-container" class="flex gap-6"></div>
        </main>
    </div>

    <!-- MODAL -->
    <div id="modal-task" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 border border-slate-700 p-8 rounded-2xl w-full max-w-lg shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">Criar Card de Operação</h2>
            <input id="task-title" type="text" placeholder="Título do Card" class="w-full p-4 bg-slate-900 rounded-xl border border-slate-700 mb-4 outline-none focus:border-blue-500">
            <textarea id="task-desc" placeholder="Descrição ou IP..." class="w-full p-4 bg-slate-900 rounded-xl border border-slate-700 mb-4 h-32 outline-none focus:border-blue-500"></textarea>
            
            <div class="mb-6">
                <label class="text-xs font-bold text-slate-500 uppercase mb-2 block">Checklist (um por linha)</label>
                <textarea id="task-check" placeholder="Ex: Verificar Firewall&#10;Bloquear IP&#10;Reiniciar logs" class="w-full p-3 bg-slate-900 rounded-xl border border-slate-700 h-24 outline-none text-xs focus:border-green-500"></textarea>
            </div>

            <div class="flex gap-4">
                <button onclick="fecharModal()" class="flex-1 p-4 text-slate-500 font-bold">CANCELAR</button>
                <button onclick="criarTarefa()" class="flex-1 bg-blue-600 p-4 rounded-xl font-black">GERAR CARD</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        function switchScreen(id) {
            ['login-screen', 'register-screen', 'dashboard-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function abrirModal() { document.getElementById('modal-task').classList.remove('hidden'); }
        function fecharModal() { document.getElementById('modal-task').classList.add('hidden'); }

        async function fazerLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            try {
                const res = await axios.post(`${API_URL}/auth/login`, { username: user, password: pass });
                localStorage.setItem('token', res.data.access_token);
                localStorage.setItem('username', user);
                document.getElementById('current-user').innerText = user.toUpperCase();
                switchScreen('dashboard-screen');
                carregarTarefas();
            } catch (err) { alert("Erro de Autenticação."); }
        }

        async function fazerCadastro() {
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            const role = document.getElementById('reg-role').value;
            try {
                await axios.post(`${API_URL}/auth/register`, { username: user, password: pass, role: role });
                alert("Operador cadastrado.");
                switchScreen('login-screen');
            } catch (err) { alert("Erro no cadastro."); }
        }

        async function carregarTarefas() {
            const token = localStorage.getItem('token');
            const statusList = ['pendente', 'iniciado', 'impedido', 'concluido'];
            const container = document.getElementById('kanban-container');
            container.innerHTML = '';

            try {
                const res = await axios.get(`${API_URL}/tasks`, { headers: { Authorization: `Bearer ${token}` } });
                
                statusList.forEach(status => {
                    const colTemplate = document.getElementById('col-template').content.cloneNode(true);
                    const colDiv = colTemplate.querySelector('.kanban-col');
                    const titleSpan = colTemplate.querySelector('.status-title span');
                    const countSpan = colTemplate.querySelector('.count');

                    titleSpan.innerText = status;
                    const tasksFiltered = res.data.filter(t => (t.status || 'pendente') === status);
                    countSpan.innerText = tasksFiltered.length;

                    tasksFiltered.forEach(task => {
                        const autor = task.description.includes('MQTT') ? 'BOT-01' : (task.username || 'OPERADOR');
                        const isBot = autor === 'BOT-01';

                        // Processar Checklist
                        let descriptionClean = task.description;
                        let checklistHtml = '';
                        if (task.description.includes('---CHECK---')) {
                            const parts = task.description.split('---CHECK---');
                            descriptionClean = parts[0];
                            const items = JSON.parse(parts[1]);
                            checklistHtml = '<div class="mt-3 pt-3 border-t border-slate-700/50 space-y-1">';
                            items.forEach((item, idx) => {
                                checklistHtml += `
                                    <div class="flex items-center gap-2 text-[10px] cursor-pointer" onclick="toggleCheck(${task.id}, ${idx})">
                                        <span class="material-symbols-outlined text-[14px] ${item.done ? 'text-green-500' : 'text-slate-600'}">
                                            ${item.done ? 'check_box' : 'check_box_outline_blank'}
                                        </span>
                                        <span class="${item.done ? 'line-through text-slate-600' : 'text-slate-400'}">${item.text}</span>
                                    </div>
                                `;
                            });
                            checklistHtml += '</div>';
                        }

                        const card = `
                            <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl shadow-lg border-l-4 ${isBot ? 'border-l-red-500' : 'border-l-blue-500'} group">
                                <div class="flex justify-between items-start mb-2">
                                    <h4 id="t-${task.id}" onblur="salvarAlteracao(${task.id})" contenteditable="true" class="card-edit font-bold text-sm text-slate-100 leading-tight">${task.title}</h4>
                                    <button onclick="deletar(${task.id})" class="text-slate-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition">
                                        <span class="material-symbols-outlined text-sm">delete</span>
                                    </button>
                                </div>
                                <p id="d-${task.id}" onblur="salvarAlteracao(${task.id})" contenteditable="true" class="card-edit text-[11px] text-slate-400 leading-relaxed">${descriptionClean}</p>
                                
                                ${checklistHtml}

                                <div class="flex items-center justify-between mt-4 pt-3 border-t border-slate-700/50">
                                    <span class="text-[9px] font-black ${isBot ? 'text-red-500' : 'text-blue-500'} flex items-center gap-1 uppercase">
                                        <span class="material-symbols-outlined text-[12px]">${isBot ? 'smart_toy' : 'person_check'}</span> ${autor}
                                    </span>
                                    <select onchange="mudarStatus(${task.id}, this.value)" class="bg-slate-900 text-[9px] font-black p-1 rounded outline-none border border-slate-700">
                                        <option value="pendente" ${status === 'pendente' ? 'selected' : ''}>PENDENTE</option>
                                        <option value="iniciado" ${status === 'iniciado' ? 'selected' : ''}>INICIADO</option>
                                        <option value="impedido" ${status === 'impedido' ? 'selected' : ''}>IMPEDIDO</option>
                                        <option value="concluido" ${status === 'concluido' ? 'selected' : ''}>CONCLUÍDO</option>
                                    </select>
                                </div>
                            </div>
                        `;
                        colDiv.innerHTML += card;
                    });
                    container.appendChild(colTemplate);
                });
            } catch (err) { console.error(err); }
        }

        async function criarTarefa() {
            const token = localStorage.getItem('token');
            const title = document.getElementById('task-title').value;
            const desc = document.getElementById('task-desc').value;
            const checkLines = document.getElementById('task-check').value.split('\n').filter(l => l.trim() !== '');
            
            const checklist = checkLines.map(l => ({ text: l, done: false }));
            const fullDesc = desc + (checklist.length > 0 ? '---CHECK---' + JSON.stringify(checklist) : '');

            try {
                await axios.post(`${API_URL}/tasks`, { title, description: fullDesc, status: 'pendente' }, { headers: { Authorization: `Bearer ${token}` } });
                fecharModal();
                carregarTarefas();
            } catch (err) { alert("Erro ao criar."); }
        }

        async function salvarAlteracao(id) {
            const token = localStorage.getItem('token');
            const title = document.getElementById(`t-${id}`).innerText;
            const descElement = document.getElementById(`d-${id}`);
            
            // Buscar se já tem checklist na descrição original para não perder
            const res = await axios.get(`${API_URL}/tasks`, { headers: { Authorization: `Bearer ${token}` } });
            const taskOriginal = res.data.find(t => t.id === id);
            let checkPart = '';
            if (taskOriginal.description.includes('---CHECK---')) {
                checkPart = '---CHECK---' + taskOriginal.description.split('---CHECK---')[1];
            }

            try {
                await axios.put(`${API_URL}/tasks/${id}`, { title, description: descElement.innerText + checkPart }, { headers: { Authorization: `Bearer ${token}` } });
                carregarTarefas();
            } catch (err) { console.error(err); }
        }

        async function toggleCheck(id, itemIdx) {
            const token = localStorage.getItem('token');
            const res = await axios.get(`${API_URL}/tasks`, { headers: { Authorization: `Bearer ${token}` } });
            const task = res.data.find(t => t.id === id);
            
            const parts = task.description.split('---CHECK---');
            const items = JSON.parse(parts[1]);
            items[itemIdx].done = !items[itemIdx].done;
            
            const newDesc = parts[0] + '---CHECK---' + JSON.stringify(items);
            await axios.put(`${API_URL}/tasks/${id}`, { description: newDesc }, { headers: { Authorization: `Bearer ${token}` } });
            carregarTarefas();
        }

        async function mudarStatus(id, status) {
            const token = localStorage.getItem('token');
            await axios.put(`${API_URL}/tasks/${id}`, { status }, { headers: { Authorization: `Bearer ${token}` } });
            carregarTarefas();
        }

        async function deletar(id) {
            const token = localStorage.getItem('token');
            if(confirm("Excluir chamado?")) {
                await axios.delete(`${API_URL}/tasks/${id}`, { headers: { Authorization: `Bearer ${token}` } });
                carregarTarefas();
            }
        }

        function renderizarTarefas(tasks) {
            // Limpa as colunas antes de desenhar
            document.getElementById('coluna-pendente').innerHTML = '';
            
            tasks.forEach(task => {
                const card = `
                    <div class="card">
                        <h3>${task.title}</h3>
                        <p>${task.description}</p>
                        <small>Responsável: ${task.username || 'Sistema'}</small> 
                        <button onclick="moverTarefa(${task.id})">Mover</button>
                    </div>
                `;
                
                // Adiciona na coluna correta baseada no status
                if(task.status === 'pendente') {
                    document.getElementById('coluna-pendente').innerHTML += card;
                }
                // ... repete para os outros status
            });
        }

        // Atualiza o dashboard automaticamente a cada 5 segundos
        setInterval(() => {
            console.log("Sincronizando com o servidor...");
            carregarTarefas(); // Nome da função que busca as tarefas na API
        }, 5000);

        function logout() { localStorage.clear(); window.location.reload(); }
    </script>
</body>
</html>
